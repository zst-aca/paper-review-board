      const first=reviews.find(x=>x.reviewWorkId===wid);
      const sel=r.reviewWorkId===wid?'selected':'';
      workOpts+=`<option value="${wid}" ${sel}>${esc((first?.paperTitle||'').slice(0,30))} (${getReviewWorkCount(wid)}轮)</option>`;
    });

    // 审稿事件预设datalist
    let rvEvH='';RV_EVENTS.forEach(e=>{rvEvH+=`<option value="${e}">`});

    ov.innerHTML=`<div class="md"><div class="mh"><h2>${isN?'📪 新建审稿记录':'✏️ 编辑审稿记录'}</h2><button class="xbtn" id="fX">✕</button></div><div>
    <div class="fg"><label class="fl">审稿期刊 *</label><input class="fi rev" id="rvJ" value="${esc(r.journal)}" placeholder="期刊名称..."></div>
    <div class="fg"><label class="fl">论文标题</label><input class="fi rev" id="rvT" value="${esc(r.paperTitle)}" placeholder="稿件标题..."></div>
    <div class="fr"><div class="fg"><label class="fl">邀请日期</label><input type="date" class="fi" id="rvI" value="${r.inviteDate||''}"></div><div class="fg"><label class="fl">截止日期</label><input type="date" class="fi" id="rvD" value="${r.dueDate||''}"></div><div class="fg nw2"><label class="fl">轮次</label><input type="number" class="fi" id="rvR" value="${r.round||1}" min="1"></div></div>
    <div class="fg"><label class="fl">审稿决定</label><select class="fi rev" id="rvDec">${decOpts}</select></div>
    <div class="fg"><label class="fl">审稿系统链接</label><input class="fi rev" id="rvL" value="${esc(r.link)}" placeholder="https://..."></div>
    <div class="fg"><label class="fl">审稿笔记</label><textarea class="fi" id="rvN" rows="3" placeholder="论文评价、主要问题...">${esc(r.notes||'')}</textarea></div>
    
    <div class="fg" style="background:var(--ibg);padding:10px;border-radius:7px;margin-top:10px"><label class="fl">审稿系统账号（可选）</label>
      <div class="fr" style="gap:10px">
        <div class="fg" style="flex:1;margin-bottom:0"><input class="fi" id="rvAccUser" value="${esc(r.account?.username||'')}" placeholder="用户名/邮箱"></div>
        <div class="fg" style="flex:1;margin-bottom:0;position:relative"><input class="fi" id="rvAccPass" type="password" value="${esc(r.account?.password||'')}" placeholder="密码"><button type="button" onclick="toggleFormPwd('rvAccPass')" style="position:absolute;right:8px;top:28px;background:none;border:none;cursor:pointer;font-size:12px;color:var(--t3)">👁️</button></div>
      </div>
    </div>

    <div class="hist-sec"><h3>🔗 关联审稿（同一稿件的多轮审稿）</h3>
    <div class="fg"><label class="fl">关联到已有审稿组</label><select class="fi" id="rvWk">${workOpts}</select></div>
    <div style="font-size:10px;color:var(--t3);margin-top:4px">将同一稿件的多轮审稿邀请关联，便于追踪历史</div>
    </div>
    
    <div class="tls"><h3>📅 处理时间线 <span style="font-weight:400;font-size:10px;color:var(--t3)">(${(r.timeline||[]).length}条)</span></h3>
    <datalist id="rvEvLb">${rvEvH}</datalist>
    <div class="tl-add">
      <div class="fg" style="flex:0 0 105px"><label class="fl">日期</label><input type="date" class="fi" id="evD" value="${td()}"></div>
      <div class="fg" style="flex:1"><label class="fl">事件</label><input class="fi" id="evL" list="rvEvLb" placeholder="选择或输入..."></div>
      <div class="fg" style="flex:1"><label class="fl">备注</label><input class="fi" id="evN" placeholder="可选"></div>
      <button class="bsav rev" id="evA" style="padding:7px 10px;flex-shrink:0">+</button>
    </div>
    ${tl.length?`<div class="tl-list">${tlH}</div>`:'<div style="font-size:11px;color:var(--t3)">暂无记录</div>'}
    </div>
    </div><div class="mf">${!isN?'<button class="bdel" id="fDl">🗑 删除</button>':'<div></div>'}<div style="display:flex;gap:6px"><button class="bcan" id="fCa">取消</button><button class="bsav rev" id="fSv">${isN?'添加':'保存'}</button></div></div></div>`;

    ov.onclick=e=>{if(e.target===ov){editing=null;rmF();render()}};
    document.getElementById('fX').onclick=document.getElementById('fCa').onclick=()=>{editing=null;rmF();render()};
    
    document.getElementById('evA').onclick=()=>{
      const l=document.getElementById('evL').value.trim();if(!l)return;
      if(!r.timeline)r.timeline=[];
      r.timeline.push({id:uid(),date:document.getElementById('evD').value,label:l,color:'#059669',note:document.getElementById('evN').value.trim()});
      syncR();rf();
    };
    document.querySelectorAll('.del-ev').forEach(b=>{b.onclick=()=>{r.timeline=r.timeline.filter(ev=>ev.id!==b.dataset.evid);syncR();rf()}});

    document.getElementById('fSv').onclick=()=>{
      syncR();
      if(!r.journal.trim()){toast('请输入期刊名称','error');return}
      r.status=r.decision?'completed':'pending';
      
      const wkVal=document.getElementById('rvWk').value;
      if(wkVal==='__new__'){r.reviewWorkId=uid()}
      else if(wkVal){r.reviewWorkId=wkVal}
      else{r.reviewWorkId=''}
      
      r.id=r.id||uid();
      if(isN)reviews.push(r);else{const idx=reviews.findIndex(x=>x.id===r.id);if(idx>=0)reviews[idx]=r}
      editing=null;rmF();persist();
    };
    const dl=document.getElementById('fDl');if(dl)dl.onclick=()=>{if(confirm('确认删除？')){reviews=reviews.filter(x=>x.id!==r.id);editing=null;rmF();persist()}};

    function syncR(){
      r.journal=document.getElementById('rvJ')?.value||'';
      r.paperTitle=document.getElementById('rvT')?.value||'';
      r.inviteDate=document.getElementById('rvI')?.value||'';
      r.dueDate=document.getElementById('rvD')?.value||'';
      r.round=parseInt(document.getElementById('rvR')?.value||'1');
      r.decision=document.getElementById('rvDec')?.value||'';
      r.link=document.getElementById('rvL')?.value||'';
      r.notes=document.getElementById('rvN')?.value||'';
      const accUser=document.getElementById('rvAccUser');
      const accPass=document.getElementById('rvAccPass');
      if(accUser&&accPass){
        if(!r.account)r.account={};
        r.account.username=accUser.value;
        r.account.password=accPass.value;
      }
    }
  }
  rf();setTimeout(()=>document.getElementById('rvJ')?.focus(),80);
}

function toggleFormPwd(inputId){
  const input=document.getElementById(inputId);
  const btn=input.nextElementSibling;
  if(input.type==='password'){
    input.type='text';
    btn.textContent='🙈';
  }else{
    input.type='password';
    btn.textContent='👁️';
  }
}

function rmF(){const m=document.getElementById('f-ov');if(m)m.remove()}

loadL();
render();
</script>
</body>
</html>
